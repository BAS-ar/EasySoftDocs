name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    
    # 1. Configuración de Permisos Explícita (Refuerza la seguridad de la organización)
    permissions:
      contents: read 
      
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Deploy Static HTML App (CAES)
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # 🛑 CRÍTICO: Usa el secreto de despliegue generado para la nueva SWA (CAES)
          # Asegúrate de que el nombre aquí coincida con el secreto en GitHub.
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_<TU_NUEVO_SECRETO_LARGO> }} 
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # 2. Configuración para HTML Estático (Archivos en la Raíz)
          app_location: "/"
          api_location: "false" 
          output_location: "/" 
          
          # 3. Omite la compilación (evita el error de Oryx)
          skip_app_build: true 

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    
    # Configuración de Permisos Explícita para cerrar el PR
    permissions:
      pull-requests: write
      
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Usa el secreto de despliegue generado para la nueva SWA (CAES)
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_BAY_054FF130F }}
          action: "close"
