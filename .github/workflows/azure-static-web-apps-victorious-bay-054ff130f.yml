name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    
    permissions:
      contents: read 
      
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Deploy Static HTML App (CAES) - Forzando Ubicación
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # CRÍTICO: Usa el secreto de despliegue generado para la nueva SWA (CAES)
          # Reemplaza <TU_NUEVO_SECRETO_LARGO> por el nombre real del secreto en GitHub.
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_BAY_054FF130F }} 
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # Configuración para archivos estáticos en la raíz
          app_location: "/"
          api_location: "false" 
          output_location: "/" 
          
          # 🛑 NUEVA LÍNEA CLAVE: Asegura que el directorio a subir es la raíz
          app_artifact_location: "/" 
          
          # Omite la compilación
          skip_app_build: true 

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    
    permissions:
      pull-requests: write
      
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_BAY_054FF130F }}
          action: "close"
