name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    
    permissions:
      contents: read 
      
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      # 🛑 PASO DE COPIA Y VERIFICACIÓN: Forzamos la creación de index.html
      - name: Force copy index.htm to index.html and verify
        run: |
          echo "1. Buscando archivos .htm en el directorio raíz (el nombre debe ser exacto, e.g., index.htm, Index.HTM):"
          # El comando 'find' nos revelará el nombre exacto del archivo en el disco del runner (Linux)
          find . -maxdepth 1 -name "*.htm"
          
          echo "2. Ejecutando la copia incondicional:"
          # Intentamos copiar. Si el nombre del archivo es incorrecto (e.g., Index.HTM), este comando fallará.
          cp index.htm index.html
          echo "Copia de index.htm a index.html completada (o fallida, revisar logs de cp)."
      
      # 🔍 PASO DE DEBUG: Muestra la lista de archivos para confirmar index.html
      - name: List files and check copy
        run: |
          echo "3. Listando archivos en el directorio de trabajo:"
          ls -l -a
        
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # CRÍTICO: Secreto de tu SWA CAES (VICTORIOUS_BAY)
          # Si este secreto es incorrecto, el error cambiará a "invalid API token". 
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_BAY_054FF130F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          app_location: "/"
          api_location: "false"
          output_location: "/"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    
    permissions:
      pull-requests: write
      
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_BAY_054FF130F }}
          action: "close"
