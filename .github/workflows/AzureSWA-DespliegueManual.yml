name: Despliegue Manual

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Despliegue y sincronización manual'
        required: false
        default: 'Despliegue a SWA y sincronización con chatbot.'

jobs:
  # ===============================================================
  # JOB 1: DESPLIEGUE A AZURE STATIC WEB APP
  # ===============================================================
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read 
      
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Force copy index.htm to index.html and verify
        run: |
          cp index.htm index.html
          echo "Copia de index.htm a index.html completada."
        
      - name: List files and check copy
        run: ls -l -a
        
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_BAY_054FF130F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: "false"
          output_location: "/"
          skip_app_build: true
