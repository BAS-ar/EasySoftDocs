name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    
    # 🚨 Permisos Explícitos para el job de despliegue
    permissions:
      contents: read # Permiso necesario para usar actions/checkout y leer el código fuente
      
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Deploy Static HTML
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Usando el nombre de secreto simplificado (Asegúrate de haberlo creado en GitHub)
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # Configuración para archivos estáticos en la raíz
          app_location: "/"
          api_location: "false" 
          output_location: "/" 
          skip_app_build: true 

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    
    # 🚨 Permisos Explícitos para el job de cierre de PR
    permissions:
      pull-requests: write # Permiso necesario para la acción de cierre de PR
      
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOY_TOKEN }}
          action: "close"
