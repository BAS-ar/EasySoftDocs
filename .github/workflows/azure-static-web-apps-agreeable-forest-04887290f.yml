name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    # Solo ejecuta en 'push' a main o en 'pull_request' que no estén cerradas
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Token de Despliegue (Debe ser correcto y estar actualizado en Secrets)
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_FOREST_04887290F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # Ubicación de la Aplicación (Fuente del código)
          app_location: "/"
          # Ubicación de la API (Vacío si no hay API)
          api_location: ""
          # Ubicación de Salida (Directorio con los archivos estáticos listos para subir)
          # *** CORRECCIÓN: Se establece a la raíz ya que skip_app_build es 'true' ***
          output_location: "/" 
          # Omite el proceso de compilación (npm install, npm run build)
          skip_app_build: true 

  close_pull_request_job:
    # Solo ejecuta cuando se cierra un Pull Request
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_FOREST_04887290F }}
          action: "close"
